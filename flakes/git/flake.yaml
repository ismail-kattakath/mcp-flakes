name: git
upstream:
  repo: https://github.com/modelcontextprotocol/servers
  commit: 275175cda17ca9c49920ceed2bcf27e12e59f8b2
  license: MIT
  subpath: src/git
runner: python
build:
  install: uv sync --locked --no-dev --no-editable
  entrypoint: ["python", "-m", "mcp_server_git"]
transport: stdio
tools:
  - git_status
  - git_diff_unstaged
  - git_diff_staged
  - git_diff
  - git_commit
  - git_add
  - git_reset
  - git_log
  - git_create_branch
  - git_checkout
  - git_show
  - git_branch
publish_image: true
compliance:
  attribution_file: ATTRIBUTION.md
  license_verified: true
  license_compatible: true
  copyright_holders:
    - "Anthropic, PBC."
    - "Model Context Protocol a Series of LF Projects, LLC."
  upstream_license_url: https://github.com/modelcontextprotocol/servers/blob/275175cda17ca9c49920ceed2bcf27e12e59f8b2/LICENSE
