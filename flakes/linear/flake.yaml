name: linear
version: 1.3.1
description: Linear MCP Server - Natural language interface to Linear project management for issues, projects, teams, and workflows
language: typescript
packageManager: npm

upstream:
  repo: https://github.com/tacticlaunch/mcp-linear
  commit: 244f92f
  license: MIT

tools:
  - name: list_issues
    description: List and filter issues with pagination
  - name: get_issue
    description: Get detailed issue information
  - name: create_issue
    description: Create a new issue with title, description, assignee
  - name: update_issue
    description: Update issue properties (status, assignee, priority, etc.)
  - name: delete_issue
    description: Delete an issue
  - name: search_issues
    description: Full-text search across issues
  - name: list_projects
    description: List all projects in workspace
  - name: get_project
    description: Get project details
  - name: create_project
    description: Create a new project
  - name: update_project
    description: Update project properties
  - name: list_teams
    description: List all teams in workspace
  - name: get_team
    description: Get team details and members
  - name: list_labels
    description: List all labels
  - name: create_label
    description: Create a new label
  - name: list_users
    description: List workspace users
  - name: get_user
    description: Get user details
  - name: list_workflows
    description: List workflow states (todo, in progress, done, etc.)
  - name: add_comment
    description: Add comment to an issue
  - name: list_comments
    description: List comments on an issue
  - name: create_project_link
    description: Link an issue to a project
  - name: list_cycles
    description: List sprint cycles
  - name: get_cycle
    description: Get cycle details

env:
  required:
    - name: LINEAR_API_KEY
      description: Linear Personal API Key from Linear Settings
      example: "lin_api_xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"
      sensitive: true

build:
  context: .
  dockerfile: Dockerfile

runtime:
  entrypoint: ["node", "dist/index.js"]

notes: |
  - Requires Linear Personal API Key from https://linear.app/settings/api
  - Natural language interface for issue management
  - Supports full CRUD operations on issues, projects, teams
  - Search and filter capabilities
  - Comment and collaboration features
  - Workflow state management
  - Sprint/cycle tracking
  - Label and project organization

compliance:
  attribution_file: ATTRIBUTION.md
  license_verified: true
  license_compatible: true
  copyright_holders:
    - "tacticlaunch"
  upstream_license_url: https://github.com/tacticlaunch/mcp-linear/blob/main/LICENSE
