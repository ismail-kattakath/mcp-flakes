services:
  mcp-k8s:
    # Prebuilt image (instant pull) - will be pushed by CI
    image: ghcr.io/mcp-flakes/k8s-mcp-server:latest

    # Build fallback - used if pull fails or for local development
    build:
      context: .
      dockerfile: Dockerfile

    # Environment variables (pass-through pattern for bundle overrides)
    environment:
      - K8S_MCP_TRANSPORT=${K8S_MCP_TRANSPORT:-stdio}
      - K8S_MCP_HOST=${K8S_MCP_HOST:-0.0.0.0}
      - K8S_MCP_PORT=${K8S_MCP_PORT:-8000}
      - K8S_MCP_LOG_LEVEL=${K8S_MCP_LOG_LEVEL:-INFO}
      - K8S_MCP_ALLOWED_COMMANDS=${K8S_MCP_ALLOWED_COMMANDS:-kubectl,helm,istioctl,argocd}
      - K8S_MCP_MAX_EXECUTION_TIME=${K8S_MCP_MAX_EXECUTION_TIME:-300}

    # Mount kubeconfig as read-only
    volumes:
      - ${HOME}/.kube:/home/appuser/.kube:ro

    # Stdio transport - no ports exposed by default
    # If using HTTP transport, expose the port
    # ports:
    #   - "${K8S_MCP_PORT:-8000}:${K8S_MCP_PORT:-8000}"

    stdin_open: true
    tty: false
