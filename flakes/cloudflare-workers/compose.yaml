services:
  mcp-cloudflare-workers:
    # Prebuilt image (instant pull) - will be pushed by CI
    image: ghcr.io/mcp-flakes/cloudflare-workers:latest

    # Build fallback - used if pull fails or for local development
    build:
      context: .
      dockerfile: Dockerfile

    # Environment variables (pass-through pattern for bundle overrides)
    environment:
      - CLOUDFLARE_API_TOKEN=${CLOUDFLARE_API_TOKEN}
      - CLOUDFLARE_ACCOUNT_ID=${CLOUDFLARE_ACCOUNT_ID}

    # HTTP transport - expose port for remote MCP access
    ports:
      - "8787:8787"

    # Note: This server runs via Wrangler dev and provides HTTP MCP endpoint
    # Access via: http://localhost:8787/mcp
