services:
  ocireg-mcp:
    build:
      context: .
      dockerfile: Dockerfile
    image: mcp-flakes/ocireg-mcp:latest
    container_name: mcp-ocireg-mcp
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - DOCKER_CONFIG=/root/.docker
    volumes:
      - ocireg-data:/root/.docker
      # Optionally mount your Docker config for authenticated registries:
      # - ~/.docker/config.json:/root/.docker/config.json:ro
    restart: unless-stopped

volumes:
  ocireg-data:
