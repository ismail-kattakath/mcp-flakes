name: time
upstream:
  repo: https://github.com/modelcontextprotocol/servers
  commit: 275175cda17ca9c49920ceed2bcf27e12e59f8b2
  license: MIT
  subpath: src/time
runner: python
build:
  install: uv sync --locked --no-dev --no-editable
  entrypoint: ["mcp-server-time"]
transport: stdio
env:
  - name: LOCAL_TIMEZONE
    required: false
    secret: false
    description: System timezone override (IANA format, e.g. America/New_York)
tools:
  - get_current_time
  - convert_time
publish_image: true
